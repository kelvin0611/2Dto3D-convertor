<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2t3D</title>
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="apple-theme">

    <nav class="glass-nav">
        <div class="nav-content">
            <span class="brand">2t<span class="dot">.</span>3D</span>
            <div class="step-indicator">
                <span class="step active" data-step="section-2d">01 繪製</span>
                <span class="arrow">→</span>
                <span class="step" data-step="section-preview">02 預覽</span>
                <span class="arrow">→</span>
                <span class="step" data-step="section-3d">03 導出</span>
            </div>
            <a href="upload.html" class="icon-btn-text">📷 上傳圖片</a>
            <a href="gallery.html" class="icon-btn-text">📂 作品集</a>
        </div>
    </nav>

    <main class="workspace-container">
        <!-- 區塊 1：2D 繪製 -->
        <section id="section-2d" class="canvas-section">
            <div class="canvas-wrapper canvas-dot-grid">
                <canvas id="canvas2d" width="600" height="600"></canvas>
            </div>
            <p id="drawMessage" class="helper-text"></p>
            <div class="floating-toolbar">
                <div class="tool-group">
                    <button type="button" id="tool-brush" class="tool-circle active" title="畫筆">🖌️</button>
                    <button type="button" id="tool-eraser" class="tool-circle" title="橡皮擦">🧽</button>
                </div>
                <div class="divider"></div>
                <div class="slider-group">
                    <input type="range" id="sizeSlider" min="2" max="30" value="10" aria-label="筆刷粗細">
                    <span id="sizeDisplay">10px</span>
                </div>
                <div class="divider"></div>
                <div class="action-group">
                    <button type="button" id="undoBtn" class="action-btn-circle" title="復原">↩</button>
                    <button type="button" id="redoBtn" class="action-btn-circle" title="重做">↪</button>
                    <button type="button" id="clearBtn" class="action-btn-circle" title="清除">🗑</button>
                    <button type="button" id="goToPreviewBtn" class="btn-primary-apple">下一步：預覽 2D</button>
                </div>
            </div>
        </section>

        <!-- 區塊 2：2D 預覽 -->
        <section id="section-preview" class="canvas-section hidden">
            <div class="preview-layout">
                <p class="section-caption">裁切後的向量圖 (SVG) — 這是系統裁切後的線稿，也是後面 3D 浮雕的輪廓。</p>
                <div id="preview2d-container" class="preview-box"></div>
                <div class="section-actions">
                    <button type="button" id="backToDrawBtn" class="btn-ghost-apple">← 回到畫板</button>
                    <button type="button" id="convertTo3dBtn" class="btn-primary-apple">生成 3D</button>
                </div>
            </div>
        </section>

        <!-- 區塊 3：3D 導出（左側表單 + 右側 3D 預覽） -->
        <section id="section-3d" class="canvas-section hidden">
            <div class="export-layout">
                <div class="export-actions">
                    <div id="container3d" class="preview-3d-box"></div>
                    <p class="hint-text">拖曳旋轉 · 滾輪或雙指縮放 · 完成後可匯出 G-code</p>
                    <p id="exportMessage" class="helper-text"></p>
                    <div class="field-apple">
                        <label for="designNameInput">作品名稱（選填）</label>
                        <input type="text" id="designNameInput" placeholder="例如：我的蝴蝶結" maxlength="80" autocomplete="off">
                    </div>
                    <div class="button-row">
                        <button type="button" id="backToPreviewBtn" class="btn-ghost-apple">← 回到預覽</button>
                        <button type="button" id="uploadServerBtn" class="btn-primary-apple">☁ 上傳</button>
                        <a href="gallery.html" class="btn-ghost-apple">📂 作品集</a>
                    </div>
                    <hr class="divider-line">
                    <p class="export-label">匯出檔案</p>
                    <div class="button-row">
                        <button type="button" id="downloadSVGBtn" class="btn-ghost-apple">SVG</button>
                        <button type="button" id="downloadSTLBtn" class="btn-ghost-apple">STL</button>
                        <button type="button" id="downloadGcodeBtn" class="btn-primary-apple">G-Code</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- 上傳成功彈窗（無 Bootstrap） -->
    <div id="uploadSuccessModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-panel">
            <h3 class="modal-title">✓ 上傳成功</h3>
            <p id="uploadSuccessMessage" class="modal-body">您的設計已儲存到伺服器。</p>
            <div class="modal-footer">
                <a href="gallery.html" class="btn-primary-apple">查看作品集</a>
                <button type="button" id="closeUploadModal" class="btn-ghost-apple">關閉</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <!-- 加上版本參數避免瀏覽器吃到舊的 app.js 快取 -->
    <script src="js/app.js?v=5"></script>
</body>
</html>
