<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2D 轉 3D 模型產生器 - 平頂擠出版</title>
    <!-- 引入 Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

    <div class="workspace">
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <h2 id="step-title" class="mb-0 text-primary fw-bold">步驟 1：在畫板上創作</h2>
            <a href="gallery.html" class="btn btn-primary">📂 作品瀏覽</a>
        </div>
        
        <!-- ========================================== -->
        <!-- 區塊 1：2D 畫圖區 -->
        <!-- ========================================== -->
        <div id="section-2d">
            <!-- 工具列 -->
            <div class="toolbar">
                <button id="tool-brush" class="btn btn-outline-primary tool-btn active">🖌️ 畫筆</button>
                <button id="tool-eraser" class="btn btn-outline-primary tool-btn">🧽 橡皮擦</button>
                
                <div class="d-flex align-items-center">
                    <label for="sizeSlider" class="form-label mb-0 me-2 text-primary fw-bold">粗細:</label>
                    <input type="range" id="sizeSlider" min="2" max="30" value="10">
                    <span id="sizeDisplay" class="ms-2 fw-bold text-primary" style="min-width: 50px;">10 px</span>
                </div>
            </div>

            <canvas id="canvas2d" width="500" height="500"></canvas>
            
            <div class="mt-4 d-flex justify-content-center gap-2">
                <button id="undoBtn" class="btn btn-outline-primary">↩️ 返回上一步</button>
                <button id="clearBtn" class="btn btn-outline-primary">🗑️ 清除全部</button>
                <button id="goToPreviewBtn" class="btn btn-primary">➡️ 下一步：預覽 2D</button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 區塊 2：2D 乾淨預覽區 (已自動裁切) -->
        <!-- ========================================== -->
        <div id="section-preview" class="hidden">
            <p class="text-muted mb-4">這是自動幫您裁切與對齊的乾淨向量圖 (SVG)。</p>
            <div id="preview2d-container">
                <!-- SVG 會被插入這裡 -->
            </div>
            <div class="mt-4 d-flex justify-content-center gap-2">
                <button id="backToDrawBtn" class="btn btn-outline-primary">⬅️ 回到畫板修改</button>
                <button id="convertTo3dBtn" class="btn btn-primary">✨ 生成 3D 模型</button>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- 區塊 3：3D 預覽與下載區 -->
        <!-- ========================================== -->
        <div id="section-3d" class="hidden">
            <div id="container3d" class="grid-pattern"></div>
            <p class="text-muted mt-2 mb-2">提示：用滑鼠左鍵拖曳旋轉、右鍵平移、滾輪縮放</p>

            <!-- 作品名稱：上傳前可自訂，方便在畫廊中辨識 -->
            <div class="mt-3 mb-3 p-3 rounded bg-light border border-secondary border-opacity-25" style="max-width: 500px; margin-left: auto; margin-right: auto;">
                <label for="designNameInput" class="form-label text-primary fw-bold mb-1">📝 作品名稱（選填）</label>
                <input type="text" id="designNameInput" class="form-control" placeholder="例如：我的蝴蝶結（未填寫將使用「design」）" maxlength="80" autocomplete="off">
                <div class="form-text mt-1 text-muted small">
                    <strong>命名提醒：</strong>僅允許字母、數字、底線、減號與各國文字；空白與特殊字元（如 / \ : * ? " &lt; &gt; |）會自動替換為底線。建議為作品取一個好記的名稱，方便在畫廊中辨識。
                </div>
            </div>
            
            <div class="mt-3 d-flex flex-wrap justify-content-center gap-2">
                <button id="backToPreviewBtn" class="btn btn-outline-primary">⬅️ 回到 2D 預覽</button>
                <button id="uploadServerBtn" class="btn btn-primary">☁️ 上傳到伺服器</button>
                <a href="gallery.html" class="btn btn-outline-primary">📂 作品瀏覽</a>
            </div>
            
            <hr class="my-4">
            <h5 class="text-primary fw-bold mb-3">📥 匯出檔案給 3D 列印機</h5>
            <div class="d-flex justify-content-center gap-2">
                <button id="downloadSVGBtn" class="btn btn-outline-primary">下載 SVG</button>
                <button id="downloadSTLBtn" class="btn btn-outline-primary">下載 STL</button>
                <button id="downloadGcodeBtn" class="btn btn-outline-primary">下載 G-Code</button>
            </div>
        </div>
    </div>

    <!-- 上傳成功彈窗 -->
    <div class="modal fade" id="uploadSuccessModal" tabindex="-1" aria-labelledby="uploadSuccessModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title text-success fw-bold" id="uploadSuccessModalLabel">✓ 上傳成功</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="關閉"></button>
                </div>
                <div class="modal-body">
                    <p id="uploadSuccessMessage" class="mb-0">您的設計已儲存到伺服器。</p>
                </div>
                <div class="modal-footer border-0 d-flex justify-content-center gap-2">
                    <a href="gallery.html" class="btn btn-primary">查看我和別人的設計</a>
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入 Three.js 以及所需的擴充套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>

    <!-- 自訂樣式與腳本 -->
    <link href="style.css" rel="stylesheet">
    <script src="app.js"></script>
</body>
</html>
