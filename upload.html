<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snek.3D — 上傳圖片轉 3D</title>
    <link href="style.css" rel="stylesheet">
</head>
<body class="apple-theme">

    <nav class="glass-nav">
        <div class="nav-content">
            <span class="brand">Snek<span class="dot">.</span>3D</span>
            <div class="step-indicator">
                <span class="step active" data-step="section-upload">01 上傳</span>
                <span class="arrow">→</span>
                <span class="step" data-step="section-preview">02 預覽</span>
                <span class="arrow">→</span>
                <span class="step" data-step="section-3d">03 導出</span>
            </div>
            <a href="index.html" class="icon-btn-text">🖌️ 繪製創作</a>
            <a href="gallery.html" class="icon-btn-text">📂 作品集</a>
        </div>
    </nav>

    <main class="workspace-container">
        <!-- 區塊 1：上傳圖片 -->
        <section id="section-upload" class="canvas-section">
            <div class="upload-layout">
                <p class="section-caption">選擇圖片，轉換為 2D 輪廓後生成 3D 模型</p>
                <div class="upload-options">
                    <label class="upload-card">
                        <input type="file" id="fileInput" accept="image/*" style="display:none">
                        <span class="upload-icon">📁</span>
                        <span class="upload-label">選擇檔案</span>
                        <span class="upload-hint">從裝置選擇圖片</span>
                    </label>
                    <label class="upload-card">
                        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
                        <span class="upload-icon">📷</span>
                        <span class="upload-label">拍照</span>
                        <span class="upload-hint">使用相機拍攝</span>
                    </label>
                </div>
                <div id="imagePreviewArea" class="preview-box preview-box--image hidden">
                    <img id="imagePreview" alt="預覽" style="max-width:100%;max-height:100%;object-fit:contain">
                </div>
                <div id="convertBtnRow" class="section-actions hidden">
                    <button type="button" id="convertTo2dBtn" class="btn-primary-apple">轉換為 2D 輪廓並生成 3D</button>
                </div>
            </div>
        </section>

        <!-- 區塊 2：2D 預覽 -->
        <section id="section-preview" class="canvas-section hidden">
            <div class="preview-layout">
                <p class="section-caption">萃取後的 2D 輪廓 (SVG)</p>
                <div id="preview2d-container" class="preview-box"></div>
                <div class="mode-row">
                    <span class="mode-label">3D 模式：</span>
                    <button type="button" id="modePixel" class="mode-btn active" title="一格一格實心，結構最穩">🟫 實心像素（較穩）</button>
                    <button type="button" id="modeSmooth" class="mode-btn" title="向量曲線擠出，邊緣最平滑">〰️ 平滑路徑（較美）</button>
                </div>
                <div class="section-actions">
                    <button type="button" id="backToUploadBtn" class="btn-ghost-apple">← 重新上傳</button>
                    <button type="button" id="goTo3dBtn" class="btn-primary-apple">生成 3D</button>
                </div>
            </div>
        </section>

        <!-- 區塊 3：3D 導出 -->
        <section id="section-3d" class="canvas-section hidden">
            <div class="export-layout">
                <div class="export-actions">
                    <div id="container3d" class="preview-3d-box"></div>
                    <p class="hint-text">左鍵旋轉 · 右鍵平移 · 滾輪縮放</p>
                    <div class="field-apple">
                        <label for="designNameInput">作品名稱（選填）</label>
                        <input type="text" id="designNameInput" placeholder="例如：我的蝴蝶結" maxlength="80" autocomplete="off">
                    </div>
                    <div class="button-row">
                        <button type="button" id="backToPreviewBtn" class="btn-ghost-apple">← 回到預覽</button>
                        <button type="button" id="uploadServerBtn" class="btn-primary-apple">☁ 上傳</button>
                        <a href="gallery.html" class="btn-ghost-apple">📂 作品集</a>
                    </div>
                    <hr class="divider-line">
                    <p class="export-label">匯出檔案</p>
                    <div class="button-row">
                        <button type="button" id="downloadSVGBtn" class="btn-ghost-apple">SVG</button>
                        <button type="button" id="downloadSTLBtn" class="btn-ghost-apple">STL</button>
                        <button type="button" id="downloadGcodeBtn" class="btn-primary-apple">G-Code</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="uploadSuccessModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-panel">
            <h3 class="modal-title">✓ 上傳成功</h3>
            <p id="uploadSuccessMessage" class="modal-body">您的設計已儲存到伺服器。</p>
            <div class="modal-footer">
                <a href="gallery.html" class="btn-primary-apple">查看作品集</a>
                <button type="button" id="closeUploadModal" class="btn-ghost-apple">關閉</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
    <script src="upload.js"></script>
</body>
</html>
